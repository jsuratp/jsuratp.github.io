name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
  schedule:
    - cron: '0 * * * *' # Hourly
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Fetch Latest Trends
        run: node scripts/fetch-trends.js

      - name: Generate Sitemap
        run: npm run generate-sitemap

      - name: Verify Site Integrity
        run: npm run verify-site

      - name: GSC Verification
        run: node scripts/gsc-verify.js ${{ secrets.GSC_CODE }}
        if: env.GSC_CODE != ''
        env:
          GSC_CODE: ${{ secrets.GSC_CODE }}

      - name: Build Astro
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Commit fresh trends data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/data/trends.json src/data/history.json src/data/metadata.json
          git commit -m "Auto-update trends, history and metadata [skip ci]" || echo "No changes to commit"
          git push origin master || echo "No changes to push"
